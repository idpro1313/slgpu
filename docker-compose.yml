name: slgpu

# vLLM/SGLang: configs/serve.sh (SLGPU_ENGINE). Слой env: main.env → configs/<engine>/*.env → пресет (export в ./slgpu up).
# Подстановка ${VAR} в YAML: env процесса; для значений из main: docker compose --env-file main.env …
#   (или: set -a && source main.env && docker compose …). В контейнер: env_file main.env ниже.

services:
  vllm:
    image: ${VLLM_DOCKER_IMAGE:-vllm/vllm-openai:latest}
    profiles: ["vllm"]
    restart: unless-stopped
    # Список физических GPU задаётся через NVIDIA_VISIBLE_DEVICES (0..TP-1 от ./slgpu up), см. cmd_up.sh
    gpus: all
    shm_size: "32gb"
    ipc: host
    ports:
      - "${LLM_API_BIND:-0.0.0.0}:${LLM_API_PORT:-8111}:8111"
    env_file:
      - main.env
      - configs/vllm/vllm.env
    environment:
      SLGPU_ENGINE: vllm
      MODEL_ID: ${MODEL_ID:-}
      MODEL_REVISION: ${MODEL_REVISION:-}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-32768}
      TP: ${TP:-8}
      GPU_MEM_UTIL: ${GPU_MEM_UTIL:-0.92}
      KV_CACHE_DTYPE: ${KV_CACHE_DTYPE:-fp8_e4m3}
      # SLGPU_* не сканируется vLLM как неизвестный VLLM_* (см. vllm.env, serve.sh). Для старых пресетов допускается VLLM_MAX_NUM_BATCHED_TOKENS на хосте.
      SLGPU_MAX_NUM_BATCHED_TOKENS: ${SLGPU_MAX_NUM_BATCHED_TOKENS:-${VLLM_MAX_NUM_BATCHED_TOKENS:-8192}}
      # 1 (по умолчанию) = --disable-custom-all-reduce (NCCL). 0 = custom all-reduce; см. serve.sh
      SLGPU_DISABLE_CUSTOM_ALL_REDUCE: ${SLGPU_DISABLE_CUSTOM_ALL_REDUCE:-1}
      # 1 = --enable-prefix-caching, 0 = --no-enable-prefix-caching; иначе из пресета в контейнер не попадёт (см. sglang: «обязаны быть здесь»).
      SLGPU_ENABLE_PREFIX_CACHING: ${SLGPU_ENABLE_PREFIX_CACHING:-1}
      TOOL_CALL_PARSER: ${TOOL_CALL_PARSER:-hermes}
      REASONING_PARSER: ${REASONING_PARSER:-qwen3}
      # GLM-5.1 (FP8): string — см. GLM/GLM5.md в vllm-project/recipes
      CHAT_TEMPLATE_CONTENT_FORMAT: ${CHAT_TEMPLATE_CONTENT_FORMAT:-}
      # MiniMax M2: JSON для --compilation-config; см. MiniMax/MiniMax-M2.md
      SLGPU_VLLM_COMPILATION_CONFIG: ${SLGPU_VLLM_COMPILATION_CONFIG:-}
      # 1 = --enable-expert-parallel (8×GPU при TP4); 0 = не передавать
      SLGPU_ENABLE_EXPERT_PARALLEL: ${SLGPU_ENABLE_EXPERT_PARALLEL:-0}
      # опционально: --data-parallel-size (сценарий DP8+EP в рецепте MiniMax)
      SLGPU_VLLM_DATA_PARALLEL_SIZE: ${SLGPU_VLLM_DATA_PARALLEL_SIZE:-}
      # Только vLLM (например moonshotai/Kimi-K2.6 — data; см. референс Moonshot / доку vLLM).
      MM_ENCODER_TP_MODE: ${MM_ENCODER_TP_MODE:-}
      VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: ${VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS:-1}
      # Согласовано с TP: первые N GPU (0..TP-1), выставляет ./slgpu up
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-0,1,2,3,4,5,6,7}
    volumes:
      - ${MODELS_DIR:-/opt/models}:/models:ro
      - ./configs/serve.sh:/etc/slgpu/serve.sh:ro
    entrypoint: ["/bin/bash"]
    command: ["/etc/slgpu/serve.sh"]
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  sglang:
    image: lmsysorg/sglang:latest
    profiles: ["sglang"]
    restart: unless-stopped
    gpus: all
    shm_size: "32gb"
    ipc: host
    ports:
      # Внутри контейнера API SGLang — 8222 (см. SGLANG_LISTEN_PORT); vLLM по-прежнему 8111.
      - "${LLM_API_BIND:-0.0.0.0}:${LLM_API_PORT:-8222}:8222"
    env_file:
      - main.env
      - configs/sglang/sglang.env
    # Переменные из пресета (source в ./slgpu up) обязаны быть здесь, иначе в контейнер не попадут
    # (пресет не в env_file). См. configs/serve.sh
    environment:
      SLGPU_ENGINE: sglang
      MODEL_ID: ${MODEL_ID:-}
      MODEL_REVISION: ${MODEL_REVISION:-}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-32768}
      TP: ${TP:-8}
      SGLANG_MEM_FRACTION_STATIC: ${SGLANG_MEM_FRACTION_STATIC:-0.90}
      KV_CACHE_DTYPE: ${KV_CACHE_DTYPE:-fp8_e4m3}
      REASONING_PARSER: ${REASONING_PARSER:-qwen3}
      TOOL_CALL_PARSER: ${TOOL_CALL_PARSER:-}
      SGLANG_CUDA_GRAPH_MAX_BS: ${SGLANG_CUDA_GRAPH_MAX_BS:-}
      SGLANG_ENABLE_TORCH_COMPILE: ${SGLANG_ENABLE_TORCH_COMPILE:-1}
      SGLANG_DISABLE_CUDA_GRAPH: ${SGLANG_DISABLE_CUDA_GRAPH:-0}
      SGLANG_DISABLE_CUSTOM_ALL_REDUCE: ${SGLANG_DISABLE_CUSTOM_ALL_REDUCE:-0}
      SGLANG_ENABLE_METRICS: ${SGLANG_ENABLE_METRICS:-1}
      SGLANG_ENABLE_MFU_METRICS: ${SGLANG_ENABLE_MFU_METRICS:-0}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-0,1,2,3,4,5,6,7}
    volumes:
      - ${MODELS_DIR:-/opt/models}:/models:ro
      - ./configs/serve.sh:/etc/slgpu/serve.sh:ro
      # Triton / TorchInductor: autotune и скомпиленные ядра (см. TRITON_CACHE_DIR в sglang.env)
      - sglang-kernel-cache:/var/cache/slgpu-kernels
    entrypoint: ["/bin/bash"]
    command: ["/etc/slgpu/serve.sh"]
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  dcgm-exporter:
    image: nvidia/dcgm-exporter:latest
    env_file:
      - main.env
    restart: unless-stopped
    gpus: all
    cap_add:
      - SYS_ADMIN
    ports:
      - "${DCGM_BIND:-127.0.0.1}:9400:9400"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  node-exporter:
    image: prom/node-exporter:latest
    env_file:
      - main.env
    restart: unless-stopped
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    ports:
      - "${NODE_EXPORTER_BIND:-127.0.0.1}:9100:9100"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  prometheus:
    image: prom/prometheus:latest
    env_file:
      - main.env
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1}:9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-0}
      - --web.enable-lifecycle
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  grafana:
    image: grafana/grafana:latest
    env_file:
      - main.env
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_BIND:-0.0.0.0}:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  grafana-data:
  prometheus-data:
  sglang-kernel-cache:
