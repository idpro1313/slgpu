name: slgpu

# vLLM/SGLang: serve.sh; переменные модели передаются из shell при ./slgpu up (см. environment ниже) + .env + configs/<engine>/<engine>.env

services:
  vllm:
    image: vllm/vllm-openai:latest
    profiles: ["vllm"]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0", "1", "2", "3", "4", "5", "6", "7"]
              capabilities: [gpu]
    shm_size: "32gb"
    ipc: host
    ports:
      - "${LLM_API_BIND:-0.0.0.0}:${LLM_API_PORT:-8111}:8111"
    env_file:
      - .env
      - configs/vllm/vllm.env
    environment:
      MODEL_ID: ${MODEL_ID:-}
      MODEL_REVISION: ${MODEL_REVISION:-}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-32768}
      TP: ${TP:-8}
      GPU_MEM_UTIL: ${GPU_MEM_UTIL:-0.92}
      KV_CACHE_DTYPE: ${KV_CACHE_DTYPE:-fp8_e4m3}
      # SLGPU_* не сканируется vLLM как неизвестный VLLM_* (см. vllm.env, serve.sh). Для старых пресетов допускается VLLM_MAX_NUM_BATCHED_TOKENS на хосте.
      SLGPU_MAX_NUM_BATCHED_TOKENS: ${SLGPU_MAX_NUM_BATCHED_TOKENS:-${VLLM_MAX_NUM_BATCHED_TOKENS:-8192}}
      TOOL_CALL_PARSER: ${TOOL_CALL_PARSER:-hermes}
      REASONING_PARSER: ${REASONING_PARSER:-qwen3}
      # Только vLLM (например moonshotai/Kimi-K2.6 — data; см. референс Moonshot / доку vLLM).
      MM_ENCODER_TP_MODE: ${MM_ENCODER_TP_MODE:-}
      VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: ${VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS:-1}
    volumes:
      - ${MODELS_DIR:-/opt/models}:/models:ro
      - ./configs/vllm/serve.sh:/etc/slgpu/serve.sh:ro
    entrypoint: ["/bin/bash"]
    command: ["/etc/slgpu/serve.sh"]
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  sglang:
    image: lmsysorg/sglang:latest
    profiles: ["sglang"]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0", "1", "2", "3", "4", "5", "6", "7"]
              capabilities: [gpu]
    shm_size: "32gb"
    ipc: host
    ports:
      - "${LLM_API_BIND:-0.0.0.0}:${LLM_API_PORT:-8111}:8111"
    env_file:
      - .env
      - configs/sglang/sglang.env
    environment:
      MODEL_ID: ${MODEL_ID:-}
      MODEL_REVISION: ${MODEL_REVISION:-}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-32768}
      TP: ${TP:-8}
      SGLANG_MEM_FRACTION_STATIC: ${SGLANG_MEM_FRACTION_STATIC:-0.90}
      KV_CACHE_DTYPE: ${KV_CACHE_DTYPE:-fp8_e4m3}
      REASONING_PARSER: ${REASONING_PARSER:-qwen3}
      TOOL_CALL_PARSER: ${TOOL_CALL_PARSER:-}
    volumes:
      - ${MODELS_DIR:-/opt/models}:/models:ro
      - ./configs/sglang/serve.sh:/etc/slgpu/serve.sh:ro
    entrypoint: ["/bin/bash"]
    command: ["/etc/slgpu/serve.sh"]
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  dcgm-exporter:
    image: nvidia/dcgm-exporter:latest
    restart: unless-stopped
    gpus: all
    cap_add:
      - SYS_ADMIN
    ports:
      - "${DCGM_BIND:-127.0.0.1}:9400:9400"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    ports:
      - "${NODE_EXPORTER_BIND:-127.0.0.1}:9100:9100"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1}:9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-0}
      - --web.enable-lifecycle
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_BIND:-0.0.0.0}:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  grafana-data:
  prometheus-data:
