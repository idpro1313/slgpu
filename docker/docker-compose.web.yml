name: slgpu-web

# Single-container web control plane for the slgpu LLM bench.
#
# Project directory for `docker compose` — корень репозитория (`./slgpu web up` — `--env-file main.env` в корне, отдельный web/.env не нужен).
# What this compose file mounts and why:
#   - SLGPU_HOST_REPO (host) -> SLGPU_HOST_REPO (container, тот же абсолютный путь!): репо CLI, configs, jobs.
#       Это критично для команд, которые из web вызывают `./slgpu monitoring up`: docker compose внутри
#       контейнера резолвит относительные bind-пути от cwd → отдаёт docker daemon путь, который daemon
#       трактует как **хостовый**. Если внутри web путь `/slgpu`, а на хосте репо в `/srv/slgpu` — daemon
#       создаёт пустые каталоги под `/slgpu/...` и монтирует их как пустые dir’ы (yaml/скрипты «исчезают»,
#       сервисы падают: minio-bucket-init exit 126, prometheus mount error и т.п.). Совпадение пути убирает
#       это рассогласование. SLGPU_HOST_REPO задаётся `scripts/cmd_web.sh` как `$(pwd)`.
#   - WEB_DATA_DIR -> /data   SQLite (default ./data/web)
#   - MODELS_DIR (host) -> $SLGPU_HOST_REPO/data/models: веса (default ./data/models)
#   - /var/run/docker.sock so backend can read container statuses (read-only)
#
# It joins the existing `slgpu` bridge network (declared by
# `docker/docker-compose.llm.yml` as `name: slgpu`) so DNS to vllm/sglang/litellm by
# service name works when the upstream stack is up.
# Build: context `./web`, Dockerfile — `docker/Dockerfile.web` (корень репо = --project-directory).

services:
  slgpu-web:
    image: slgpu-web:dev
    build:
      context: ./web
      dockerfile: ../docker/Dockerfile.web
    container_name: slgpu-web
    restart: unless-stopped
    # user: not set — entrypoint starts as root, chown /data and data/models|presets mounts, then runs app as 10001
    # working_dir НЕ переопределяем: uvicorn запускается из WORKDIR `/srv/app` (Dockerfile.web),
    # где лежит пакет `app/`. Иначе — `ModuleNotFoundError: No module named 'app'`.
    # Для CLI-вызовов backend сам устанавливает cwd=settings.slgpu_root в jobs.py.
    environment:
      WEB_APP_NAME: slgpu-web
      WEB_LOG_LEVEL: ${WEB_LOG_LEVEL:-INFO}
      WEB_SLGPU_ROOT: ${SLGPU_HOST_REPO:-/slgpu}
      WEB_DATA_DIR: /data
      # Имена `com.docker.compose.project` — если `docker compose` поднят с другим COMPOSE_PROJECT_NAME
      WEB_COMPOSE_PROJECT_INFER: ${WEB_COMPOSE_PROJECT_INFER:-slgpu}
      WEB_COMPOSE_PROJECT_MONITORING: ${WEB_COMPOSE_PROJECT_MONITORING:-slgpu-monitoring}
      WEB_DATABASE_URL: sqlite+aiosqlite:////data/slgpu-web.db
      WEB_STATIC_DIR: /srv/static
      WEB_DOCKER_SOCKET: unix:///var/run/docker.sock
      WEB_LLM_DEFAULT_VLLM_PORT: "${LLM_API_PORT:-8111}"
      WEB_LLM_DEFAULT_SGLANG_PORT: "${LLM_API_PORT_SGLANG:-8222}"
      WEB_GRAFANA_PORT: "${GRAFANA_PORT:-3000}"
      WEB_PROMETHEUS_PORT: "${PROMETHEUS_PORT:-9090}"
      WEB_LANGFUSE_PORT: "${LANGFUSE_PORT:-3001}"
      WEB_LITELLM_PORT: "${LITELLM_PORT:-4000}"
      WEB_LOKI_PORT: "${LOKI_PORT:-3100}"
      # HTTP-пробы из slgpu-web к стеку monitoring (порты на хосте, не 127.0.0.1 внутри контейнера)
      WEB_MONITORING_HTTP_HOST: host.docker.internal
      # /v1/models и /metrics к vLLM/SGLang: с 127.0.0.1 внутри web не видно опубликованный порт на хосте
      WEB_LLM_HTTP_HOST: host.docker.internal
    volumes:
      - ${SLGPU_HOST_REPO:-.}:${SLGPU_HOST_REPO:-/slgpu}
      - ${WEB_DATA_DIR:-./data/web}:/data
      - ${MODELS_DIR:-./data/models}:${SLGPU_HOST_REPO:-/slgpu}/data/models:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${WEB_BIND:-0.0.0.0}:${WEB_PORT:-8089}:8000"
    networks:
      - slgpu
    # GPU в slgpu-web не обязателен: блок «Сервер» опрашивает железо хоста через docker run
    # (bind /proc, /etc и эфемерный контейнер с nvidia-smi + GPU). Опционально можно пробросить GPU в web:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

networks:
  slgpu:
    external: true
    name: slgpu
