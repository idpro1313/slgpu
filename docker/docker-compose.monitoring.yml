# DCGM, node-exporter, Prometheus, Grafana, Loki, Promtail — `./slgpu monitoring up`.
# Langfuse + LiteLLM + Postgres/MinIO/… — `docker/docker-compose.proxy.yml` (проект `slgpu-proxy`), тот же `./slgpu monitoring up` после metrics.
# Внешняя сеть `slgpu`. env: `${WEB_DATA_DIR}/.slgpu/compose-service.env` (по умолч. data/web; из БД / main.env).

name: ${WEB_COMPOSE_PROJECT_MONITORING}

services:
  dcgm-exporter:
    # Жёсткие имена без …-1; внутри сети `slgpu` обращайтесь по имени сервиса (dcgm-exporter, postgres, …)
    container_name: slgpu-monitoring-dcgm-exporter
    image: ${DCGM_EXPORTER_IMAGE}
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    restart: unless-stopped
    gpus: all
    cap_add:
      - SYS_ADMIN
    ports:
      - "${DCGM_BIND}:9400:9400"
    networks:
      - slgpu
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  node-exporter:
    container_name: slgpu-monitoring-node-exporter
    image: ${NODE_EXPORTER_IMAGE}
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    restart: unless-stopped
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    ports:
      - "${NODE_EXPORTER_BIND}:9100:9100"
    networks:
      - slgpu
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  loki:
    container_name: slgpu-monitoring-loki
    image: ${LOKI_IMAGE}
    # Данные Loki: chunks, index, wal — на хосте; права: ./slgpu monitoring fix-perms
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    restart: unless-stopped
    # Каталог целиком в /etc/loki (не один файл): иначе при отсутствии файла на хосте Docker
    # может создать каталог `loki-config.yaml` → «is a directory».
    command: -config.file=/etc/loki/loki-config.yaml
    networks:
      - slgpu
    ports:
      - "${LOKI_BIND}:${LOKI_PORT}:3100"
    volumes:
      - ${LOKI_DATA_DIR}:/loki
      - ./configs/monitoring/loki:/etc/loki:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  promtail:
    container_name: slgpu-monitoring-promtail
    image: ${PROMTAIL_IMAGE}
    # Сбор json-логов Docker: socket + /var/lib/docker/containers; позиции — PROMTAIL_DATA_DIR
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    restart: unless-stopped
    user: root
    # Аналогично Loki: монтирование каталога, чтобы путь к конфигу оставался файлом.
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_started
    networks:
      - slgpu
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ${PROMTAIL_DATA_DIR}:/data
      - ./configs/monitoring/promtail:/etc/promtail:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  prometheus:
    container_name: slgpu-monitoring-prometheus
    image: ${PROMETHEUS_IMAGE}
    # Права на PROMETHEUS_DATA_DIR: ./scripts/monitoring_fix_permissions.sh или ./slgpu monitoring fix-perms
    # Скрейп vLLM/SGLang идёт на host.docker.internal:порт (см. prometheus.yml) — шлюз в хост, где
    # слушают опубликованные 8111/8222. Нужен для Linux (compose: host-gateway).
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PROMETHEUS_BIND}:${PROMETHEUS_PORT}:9090"
    networks:
      - slgpu
    volumes:
      - ${PROMETHEUS_DATA_DIR}:/prometheus
      # Каталог целиком (как Loki): иначе при «пустом» пути Docker создаёт каталог вместо .yml.
      - ./configs/monitoring/prometheus:/etc/prometheus:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE}
      - --web.enable-lifecycle
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  grafana:
    container_name: slgpu-monitoring-grafana
    image: ${GRAFANA_IMAGE}
    # Права на GRAFANA_DATA_DIR: ./slgpu monitoring fix-perms (uid/gid из образа, без угадывания)
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    ports:
      - "${GRAFANA_BIND}:${GRAFANA_PORT}:3000"
    networks:
      - slgpu
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL}
    volumes:
      - ${GRAFANA_DATA_DIR}:/var/lib/grafana
      - ./configs/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

networks:
  slgpu:
    name: slgpu
    external: true
