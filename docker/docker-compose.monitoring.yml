# DCGM, node-exporter, Prometheus, Grafana, Loki, Promtail — `./slgpu monitoring up`.
# Langfuse + LiteLLM + Postgres/MinIO/… — `docker/docker-compose.proxy.yml` (проект `slgpu-proxy`), тот же `./slgpu monitoring up` после metrics.
# Внешняя сеть `slgpu`. env: `.slgpu/compose-service.env`.

name: slgpu-monitoring

services:
  dcgm-exporter:
    # Жёсткие имена без …-1; внутри сети `slgpu` обращайтесь по имени сервиса (dcgm-exporter, postgres, …)
    container_name: slgpu-monitoring-dcgm-exporter
    image: ${DCGM_EXPORTER_IMAGE:-${SLGPU_DCGM_EXPORTER_IMAGE:-nvidia/dcgm-exporter:3.3.5-3.4.0-ubuntu22.04}}
    env_file:
      - .slgpu/compose-service.env
    restart: unless-stopped
    gpus: all
    cap_add:
      - SYS_ADMIN
    ports:
      - "${DCGM_BIND:-127.0.0.1}:9400:9400"
    networks:
      - slgpu
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  node-exporter:
    container_name: slgpu-monitoring-node-exporter
    image: ${NODE_EXPORTER_IMAGE:-${SLGPU_NODE_EXPORTER_IMAGE:-prom/node-exporter:v1.8.2}}
    env_file:
      - .slgpu/compose-service.env
    restart: unless-stopped
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    ports:
      - "${NODE_EXPORTER_BIND:-127.0.0.1}:9100:9100"
    networks:
      - slgpu
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  loki:
    container_name: slgpu-monitoring-loki
    image: ${LOKI_IMAGE:-${SLGPU_LOKI_IMAGE:-grafana/loki:2.9.8}}
    # Данные Loki: chunks, index, wal — на хосте; права: ./slgpu monitoring fix-perms
    env_file:
      - .slgpu/compose-service.env
    restart: unless-stopped
    # Каталог целиком в /etc/loki (не один файл): иначе при отсутствии файла на хосте Docker
    # может создать каталог `loki-config.yaml` → «is a directory».
    command: -config.file=/etc/loki/loki-config.yaml
    networks:
      - slgpu
    ports:
      - "${LOKI_BIND:-127.0.0.1}:${LOKI_PORT:-3100}:3100"
    volumes:
      - ${LOKI_DATA_DIR:-./data/monitoring/loki}:/loki
      - ./configs/monitoring/loki:/etc/loki:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  promtail:
    container_name: slgpu-monitoring-promtail
    image: ${PROMTAIL_IMAGE:-${SLGPU_PROMTAIL_IMAGE:-grafana/promtail:2.9.8}}
    # Сбор json-логов Docker: socket + /var/lib/docker/containers; позиции — PROMTAIL_DATA_DIR
    env_file:
      - .slgpu/compose-service.env
    restart: unless-stopped
    user: root
    # Аналогично Loki: монтирование каталога, чтобы путь к конфигу оставался файлом.
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    networks:
      - slgpu
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ${PROMTAIL_DATA_DIR:-./data/monitoring/promtail}:/data
      - ./configs/monitoring/promtail:/etc/promtail:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  prometheus:
    container_name: slgpu-monitoring-prometheus
    image: ${PROMETHEUS_IMAGE:-${SLGPU_PROMETHEUS_IMAGE:-prom/prometheus:v2.55.1}}
    # Права на PROMETHEUS_DATA_DIR: ./scripts/monitoring_fix_permissions.sh или ./slgpu monitoring fix-perms
    # Скрейп vLLM/SGLang идёт на host.docker.internal:порт (см. prometheus.yml) — шлюз в хост, где
    # слушают опубликованные 8111/8222. Нужен для Linux (compose: host-gateway).
    env_file:
      - .slgpu/compose-service.env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PROMETHEUS_BIND:-0.0.0.0}:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - slgpu
    volumes:
      - ${PROMETHEUS_DATA_DIR:-./data/monitoring/prometheus}:/prometheus
      # Каталог целиком (как Loki): иначе при «пустом» пути Docker создаёт каталог вместо .yml.
      - ./configs/monitoring/prometheus:/etc/prometheus:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-100y}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-0}
      - --web.enable-lifecycle
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  grafana:
    container_name: slgpu-monitoring-grafana
    image: ${GRAFANA_IMAGE:-${SLGPU_GRAFANA_IMAGE:-grafana/grafana:11.3.0}}
    # Права на GRAFANA_DATA_DIR: ./slgpu monitoring fix-perms (uid/gid из образа, без угадывания)
    env_file:
      - .slgpu/compose-service.env
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    ports:
      - "${GRAFANA_BIND:-0.0.0.0}:${GRAFANA_PORT:-3000}:3000"
    networks:
      - slgpu
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-}
    volumes:
      - ${GRAFANA_DATA_DIR:-./data/monitoring/grafana}:/var/lib/grafana
      - ./configs/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

networks:
  slgpu:
    name: slgpu
    external: true
