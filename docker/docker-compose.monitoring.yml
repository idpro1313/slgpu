# DCGM, node-exporter, Prometheus, Grafana, Loki, Promtail — поднимаются из `slgpu-web` через `native.monitoring.up`.
# `dcgm-exporter` в profile `gpu` (см. MONITORING_DCGM в стеке БД): без GPU стек метрик поднимается без DCGM.
# Langfuse + LiteLLM + Postgres/MinIO/… — `docker/docker-compose.proxy.yml` (проект `${WEB_COMPOSE_PROJECT_PROXY}`).
# Внешняя сеть: `${SLGPU_NETWORK_NAME}`. env: `${WEB_DATA_DIR}/.slgpu/compose-service.env` (генерируется backend из БД).

name: ${WEB_COMPOSE_PROJECT_MONITORING}

services:
  dcgm-exporter:
    container_name: ${DCGM_EXPORTER_CONTAINER_NAME}
    hostname: ${DCGM_EXPORTER_SERVICE_NAME}
    image: ${DCGM_EXPORTER_IMAGE}
    profiles:
      - gpu
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    restart: unless-stopped
    gpus: all
    cap_add:
      - SYS_ADMIN
    ports:
      - "${DCGM_BIND}:${DCGM_EXPORTER_INTERNAL_PORT}:${DCGM_EXPORTER_INTERNAL_PORT}"
    networks:
      slgpu:
        aliases:
          - ${DCGM_EXPORTER_SERVICE_NAME}
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  node-exporter:
    container_name: ${NODE_EXPORTER_CONTAINER_NAME}
    hostname: ${NODE_EXPORTER_SERVICE_NAME}
    image: ${NODE_EXPORTER_IMAGE}
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    restart: unless-stopped
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    ports:
      - "${NODE_EXPORTER_BIND}:${NODE_EXPORTER_INTERNAL_PORT}:${NODE_EXPORTER_INTERNAL_PORT}"
    networks:
      slgpu:
        aliases:
          - ${NODE_EXPORTER_SERVICE_NAME}
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  loki:
    container_name: ${LOKI_CONTAINER_NAME}
    hostname: ${LOKI_SERVICE_NAME}
    image: ${LOKI_IMAGE}
    # Данные Loki: chunks, index, wal — на хосте; права: ./slgpu monitoring fix-perms
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    restart: unless-stopped
    # Каталог целиком в /etc/loki (не один файл): иначе при отсутствии файла на хосте Docker
    # может создать каталог `loki-config.yaml` → «is a directory».
    command: -config.file=/etc/loki/loki-config.yaml
    networks:
      slgpu:
        aliases:
          - ${LOKI_SERVICE_NAME}
    ports:
      - "${LOKI_BIND}:${LOKI_PORT}:${LOKI_INTERNAL_PORT}"
    volumes:
      - ${LOKI_DATA_DIR}:/loki
      # Сгенерированный из БД конфиг (см. render_monitoring_configs в backend).
      - ${WEB_DATA_DIR}/.slgpu/monitoring:/etc/loki:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  promtail:
    container_name: ${PROMTAIL_CONTAINER_NAME}
    hostname: ${PROMTAIL_SERVICE_NAME}
    image: ${PROMTAIL_IMAGE}
    # Сбор json-логов Docker: socket + /var/lib/docker/containers; позиции — PROMTAIL_DATA_DIR
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    restart: unless-stopped
    user: root
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_started
    networks:
      slgpu:
        aliases:
          - ${PROMTAIL_SERVICE_NAME}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ${PROMTAIL_DATA_DIR}:/data
      - ${WEB_DATA_DIR}/.slgpu/monitoring:/etc/promtail:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  prometheus:
    container_name: ${PROMETHEUS_CONTAINER_NAME}
    hostname: ${PROMETHEUS_SERVICE_NAME}
    image: ${PROMETHEUS_IMAGE}
    # Права на PROMETHEUS_DATA_DIR: UI «Стек мониторинга» → «Чинить права» (native.monitoring.fix-perms)
    # Скрейп vLLM/SGLang идёт на host.docker.internal:порт (см. отрендеренный prometheus.yml) — мост в хост.
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PROMETHEUS_BIND}:${PROMETHEUS_PORT}:${PROMETHEUS_INTERNAL_PORT}"
    networks:
      slgpu:
        aliases:
          - ${PROMETHEUS_SERVICE_NAME}
    volumes:
      - ${PROMETHEUS_DATA_DIR}:/prometheus
      # Сгенерированный из БД prometheus.yml + статичные alerts (см. render_monitoring_configs).
      - ${WEB_DATA_DIR}/.slgpu/monitoring:/etc/prometheus:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE}
      - --web.enable-lifecycle
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  grafana:
    container_name: ${GRAFANA_CONTAINER_NAME}
    hostname: ${GRAFANA_SERVICE_NAME}
    image: ${GRAFANA_IMAGE}
    # Права на GRAFANA_DATA_DIR: ./slgpu monitoring fix-perms (uid/gid из образа, без угадывания)
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    ports:
      - "${GRAFANA_BIND}:${GRAFANA_PORT}:${GRAFANA_INTERNAL_PORT}"
    networks:
      slgpu:
        aliases:
          - ${GRAFANA_SERVICE_NAME}
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL}
    volumes:
      - ${GRAFANA_DATA_DIR}:/var/lib/grafana
      # Provisioning: НЕ весь ./provisioning:ro + файл datasource — у Docker/parent :ro
      # вложенный file-bind на путь внутри дерева даёт «read-only file system» (make mountpoint).
      # Статика: dashboards/alerting/plugins; datasource.yml — только из render_monitoring_configs (БД).
      - ./configs/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./configs/monitoring/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./configs/monitoring/grafana/provisioning/plugins:/etc/grafana/provisioning/plugins:ro
      - ${WEB_DATA_DIR}/.slgpu/monitoring/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

networks:
  slgpu:
    name: ${SLGPU_NETWORK_NAME}
    external: true
