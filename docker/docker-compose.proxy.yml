# Langfuse v3 (Postgres, ClickHouse, Redis, MinIO) + worker + UI; LiteLLM; bootstrap (MinIO buckets, БД litellm).
# Проект `${WEB_COMPOSE_PROJECT_PROXY}` — **не** зависит от стека метрик (Prometheus/Grafana/Loki) в `docker-compose.monitoring.yml`.
# Внешняя сеть: `${SLGPU_NETWORK_NAME}`. env: `${WEB_DATA_DIR}/.slgpu/compose-service.env`.
# Все имена контейнеров, DNS-алиасы и внутренние порты — параметризованы; значения берутся из БД (stack_params).

name: ${WEB_COMPOSE_PROJECT_PROXY}

services:
  clickhouse:
    container_name: ${CLICKHOUSE_CONTAINER_NAME}
    hostname: ${CLICKHOUSE_SERVICE_NAME}
    image: ${LANGFUSE_CLICKHOUSE_IMAGE}
    restart: unless-stopped
    user: "101:101"
    networks:
      slgpu:
        aliases:
          - ${CLICKHOUSE_SERVICE_NAME}
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
    volumes:
      - ${LANGFUSE_CLICKHOUSE_DATA_DIR}:/var/lib/clickhouse
      - ${LANGFUSE_CLICKHOUSE_LOGS_DIR}:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${CLICKHOUSE_HTTP_INTERNAL_PORT}/ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  minio:
    container_name: ${MINIO_CONTAINER_NAME}
    hostname: ${MINIO_SERVICE_NAME}
    image: ${MINIO_IMAGE}
    restart: unless-stopped
    command: server /data --console-address ":${MINIO_CONSOLE_INTERNAL_PORT}"
    networks:
      slgpu:
        aliases:
          - ${MINIO_SERVICE_NAME}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_BIND}:${MINIO_API_HOST_PORT}:${MINIO_API_INTERNAL_PORT}"
      - "${MINIO_CONSOLE_BIND}:${MINIO_CONSOLE_HOST_PORT}:${MINIO_CONSOLE_INTERNAL_PORT}"
    volumes:
      - ${LANGFUSE_MINIO_DATA_DIR}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:${MINIO_API_INTERNAL_PORT}/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  minio-bucket-init:
    container_name: ${MINIO_BUCKET_INIT_CONTAINER_NAME}
    image: ${MINIO_MC_IMAGE}
    profiles: ["bootstrap"]
    restart: "no"
    networks:
      - slgpu
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVICE_NAME: ${MINIO_SERVICE_NAME}
      MINIO_API_INTERNAL_PORT: ${MINIO_API_INTERNAL_PORT}
      BUCKET_EVENT: ${LANGFUSE_S3_EVENT_UPLOAD_BUCKET}
      BUCKET_MEDIA: ${LANGFUSE_S3_MEDIA_BUCKET}
    volumes:
      - ./configs/monitoring/langfuse/minio-bucket-init.sh:/init/minio-bucket-init.sh:ro
    entrypoint: ["/bin/sh", "/init/minio-bucket-init.sh"]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"

  redis:
    container_name: ${REDIS_CONTAINER_NAME}
    hostname: ${REDIS_SERVICE_NAME}
    image: ${LANGFUSE_REDIS_IMAGE}
    restart: unless-stopped
    networks:
      slgpu:
        aliases:
          - ${REDIS_SERVICE_NAME}
    command:
      - redis-server
      - --requirepass
      - ${LANGFUSE_REDIS_AUTH}
      - --maxmemory-policy
      - noeviction
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASS\" ping | grep -q PONG"]
      interval: 3s
      timeout: 5s
      retries: 20
    environment:
      REDIS_PASS: ${LANGFUSE_REDIS_AUTH}
    volumes:
      - ${LANGFUSE_REDIS_DATA_DIR}:/data
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  postgres:
    container_name: ${POSTGRES_CONTAINER_NAME}
    hostname: ${POSTGRES_SERVICE_NAME}
    image: ${LANGFUSE_POSTGRES_IMAGE}
    restart: unless-stopped
    networks:
      slgpu:
        aliases:
          - ${POSTGRES_SERVICE_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_POSTGRES_USER}"]
      interval: 3s
      timeout: 5s
      retries: 20
    environment:
      POSTGRES_USER: ${LANGFUSE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${LANGFUSE_POSTGRES_DB}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - ${LANGFUSE_POSTGRES_DATA_DIR}:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  langfuse-worker:
    container_name: ${LANGFUSE_WORKER_CONTAINER_NAME}
    hostname: ${LANGFUSE_WORKER_SERVICE_NAME}
    image: ${LANGFUSE_WORKER_IMAGE}
    restart: unless-stopped
    networks:
      slgpu:
        aliases:
          - ${LANGFUSE_WORKER_SERVICE_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "${LANGFUSE_WORKER_BIND}:${LANGFUSE_WORKER_PORT}:${LANGFUSE_WORKER_INTERNAL_PORT}"
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: ${LANGFUSE_TELEMETRY}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      LANGFUSE_USE_AZURE_BLOB: "false"
      LANGFUSE_USE_OCI_NATIVE_OBJECT_STORAGE: "false"
      DATABASE_URL: postgresql://${LANGFUSE_POSTGRES_USER}:${LANGFUSE_POSTGRES_PASSWORD}@${POSTGRES_SERVICE_NAME}:${POSTGRES_INTERNAL_PORT}/${LANGFUSE_POSTGRES_DB}
      CLICKHOUSE_MIGRATION_URL: clickhouse://${CLICKHOUSE_SERVICE_NAME}:${CLICKHOUSE_TCP_INTERNAL_PORT}
      CLICKHOUSE_URL: http://${CLICKHOUSE_SERVICE_NAME}:${CLICKHOUSE_HTTP_INTERNAL_PORT}
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: ${REDIS_SERVICE_NAME}
      REDIS_PORT: ${REDIS_INTERNAL_PORT}
      REDIS_AUTH: ${LANGFUSE_REDIS_AUTH}
      REDIS_TLS_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_EVENT_UPLOAD_BUCKET}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://${MINIO_SERVICE_NAME}:${MINIO_API_INTERNAL_PORT}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: ${LANGFUSE_S3_MEDIA_BUCKET}
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://${MINIO_SERVICE_NAME}:${MINIO_API_INTERNAL_PORT}
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  langfuse-web:
    container_name: ${LANGFUSE_WEB_CONTAINER_NAME}
    hostname: ${LANGFUSE_WEB_SERVICE_NAME}
    image: ${LANGFUSE_IMAGE}
    restart: unless-stopped
    networks:
      slgpu:
        aliases:
          - ${LANGFUSE_WEB_SERVICE_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "${LANGFUSE_BIND}:${LANGFUSE_PORT}:${LANGFUSE_WEB_INTERNAL_PORT}"
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
    environment:
      HOSTNAME: "0.0.0.0"
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: ${LANGFUSE_TELEMETRY}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      LANGFUSE_USE_AZURE_BLOB: "false"
      LANGFUSE_USE_OCI_NATIVE_OBJECT_STORAGE: "false"
      DATABASE_URL: postgresql://${LANGFUSE_POSTGRES_USER}:${LANGFUSE_POSTGRES_PASSWORD}@${POSTGRES_SERVICE_NAME}:${POSTGRES_INTERNAL_PORT}/${LANGFUSE_POSTGRES_DB}
      CLICKHOUSE_MIGRATION_URL: clickhouse://${CLICKHOUSE_SERVICE_NAME}:${CLICKHOUSE_TCP_INTERNAL_PORT}
      CLICKHOUSE_URL: http://${CLICKHOUSE_SERVICE_NAME}:${CLICKHOUSE_HTTP_INTERNAL_PORT}
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: ${REDIS_SERVICE_NAME}
      REDIS_PORT: ${REDIS_INTERNAL_PORT}
      REDIS_AUTH: ${LANGFUSE_REDIS_AUTH}
      REDIS_TLS_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_EVENT_UPLOAD_BUCKET}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://${MINIO_SERVICE_NAME}:${MINIO_API_INTERNAL_PORT}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: ${LANGFUSE_S3_MEDIA_BUCKET}
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://${MINIO_SERVICE_NAME}:${MINIO_API_INTERNAL_PORT}
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  litellm-pg-init:
    container_name: ${LITELLM_PG_INIT_CONTAINER_NAME}
    image: ${LANGFUSE_POSTGRES_IMAGE}
    profiles: ["bootstrap"]
    restart: "no"
    networks:
      - slgpu
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${LANGFUSE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD}
      POSTGRES_SERVICE_NAME: ${POSTGRES_SERVICE_NAME}
      POSTGRES_INTERNAL_PORT: ${POSTGRES_INTERNAL_PORT}
      LITELLM_DB_NAME: ${LITELLM_POSTGRES_DB}
    volumes:
      - ./configs/monitoring/litellm/init-litellm-db.sh:/init/init-litellm-db.sh:ro
    entrypoint: ["/bin/sh", "/init/init-litellm-db.sh"]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"

  litellm:
    container_name: ${LITELLM_CONTAINER_NAME}
    hostname: ${LITELLM_SERVICE_NAME}
    image: ${LITELLM_IMAGE}
    restart: unless-stopped
    networks:
      slgpu:
        aliases:
          - ${LITELLM_SERVICE_NAME}
    entrypoint: ["/bin/sh", "/etc/slgpu/litellm-entrypoint.sh"]
    env_file:
      - ${WEB_DATA_DIR}/.slgpu/compose-service.env
      - ${WEB_DATA_DIR}/secrets/langfuse-litellm.env
    depends_on:
      postgres:
        condition: service_healthy
      langfuse-web:
        condition: service_started
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://${LANGFUSE_POSTGRES_USER}:${LANGFUSE_POSTGRES_PASSWORD}@${POSTGRES_SERVICE_NAME}:${POSTGRES_INTERNAL_PORT}/${LITELLM_POSTGRES_DB}
      LANGFUSE_OTEL_HOST: http://${LANGFUSE_WEB_SERVICE_NAME}:${LANGFUSE_WEB_INTERNAL_PORT}
      STORE_MODEL_IN_DB: ${STORE_MODEL_IN_DB}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${LITELLM_BIND}:${LITELLM_PORT}:${LITELLM_PORT}"
    volumes:
      - ./configs/monitoring/litellm/litellm-entrypoint.sh:/etc/slgpu/litellm-entrypoint.sh:ro
      - ./configs/monitoring/litellm/config.yaml:/etc/slgpu/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

networks:
  slgpu:
    name: ${SLGPU_NETWORK_NAME}
    external: true
