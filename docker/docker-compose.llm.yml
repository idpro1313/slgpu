name: slgpu

# vLLM/SGLang: scripts/serve.sh (SLGPU_ENGINE). Подстановки только ${VAR} — значения в compose-service.env / configs/main.env + БД.

services:
  vllm:
    container_name: slgpu-vllm
    image: ${VLLM_DOCKER_IMAGE}
    profiles: ["vllm"]
    restart: unless-stopped
    gpus: all
    shm_size: "32gb"
    ipc: host
    ports:
      - "${LLM_API_BIND}:${LLM_API_PORT}:${VLLM_PORT}"
    env_file:
      - configs/main.env
    environment:
      SLGPU_ENGINE: vllm
      SLGPU_MODEL_ROOT: ${SLGPU_MODEL_ROOT}
      SERVED_MODEL_NAME: ${SERVED_MODEL_NAME}
      VLLM_HOST: ${VLLM_HOST}
      VLLM_PORT: ${VLLM_PORT}
      TRUST_REMOTE_CODE: ${TRUST_REMOTE_CODE}
      ENABLE_CHUNKED_PREFILL: ${ENABLE_CHUNKED_PREFILL}
      ENABLE_AUTO_TOOL_CHOICE: ${ENABLE_AUTO_TOOL_CHOICE}
      MODEL_ID: ${MODEL_ID}
      MODEL_REVISION: ${MODEL_REVISION}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN}
      BLOCK_SIZE: ${BLOCK_SIZE}
      TP: ${TP}
      GPU_MEM_UTIL: ${GPU_MEM_UTIL}
      KV_CACHE_DTYPE: ${KV_CACHE_DTYPE}
      MAX_NUM_BATCHED_TOKENS: ${MAX_NUM_BATCHED_TOKENS}
      MAX_NUM_SEQS: ${MAX_NUM_SEQS}
      DISABLE_CUSTOM_ALL_REDUCE: ${DISABLE_CUSTOM_ALL_REDUCE}
      ENABLE_PREFIX_CACHING: ${ENABLE_PREFIX_CACHING}
      TOOL_CALL_PARSER: ${TOOL_CALL_PARSER}
      REASONING_PARSER: ${REASONING_PARSER}
      CHAT_TEMPLATE_CONTENT_FORMAT: ${CHAT_TEMPLATE_CONTENT_FORMAT}
      COMPILATION_CONFIG: ${COMPILATION_CONFIG}
      ENFORCE_EAGER: ${ENFORCE_EAGER}
      SPECULATIVE_CONFIG: ${SPECULATIVE_CONFIG}
      ENABLE_EXPERT_PARALLEL: ${ENABLE_EXPERT_PARALLEL}
      DATA_PARALLEL_SIZE: ${DATA_PARALLEL_SIZE}
      MM_ENCODER_TP_MODE: ${MM_ENCODER_TP_MODE}
      ATTENTION_BACKEND: ${ATTENTION_BACKEND}
      TOKENIZER_MODE: ${TOKENIZER_MODE}
      VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: ${VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
    volumes:
      - ${MODELS_DIR}:/models:ro
      - ./scripts/serve.sh:/etc/slgpu/serve.sh:ro
    entrypoint: ["/bin/bash"]
    command: ["/etc/slgpu/serve.sh"]
    networks:
      - slgpu
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  sglang:
    container_name: slgpu-sglang
    image: ${SGLANG_DOCKER_IMAGE}
    profiles: ["sglang"]
    restart: unless-stopped
    gpus: all
    shm_size: "32gb"
    ipc: host
    ports:
      - "${LLM_API_BIND}:${LLM_API_PORT_SGLANG}:${SGLANG_LISTEN_PORT}"
    env_file:
      - configs/main.env
    environment:
      SLGPU_ENGINE: sglang
      SLGPU_MODEL_ROOT: ${SLGPU_MODEL_ROOT}
      SGLANG_TRUST_REMOTE_CODE: ${SGLANG_TRUST_REMOTE_CODE}
      MODEL_ID: ${MODEL_ID}
      MODEL_REVISION: ${MODEL_REVISION}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN}
      TP: ${TP}
      SGLANG_MEM_FRACTION_STATIC: ${SGLANG_MEM_FRACTION_STATIC}
      KV_CACHE_DTYPE: ${KV_CACHE_DTYPE}
      REASONING_PARSER: ${REASONING_PARSER}
      TOOL_CALL_PARSER: ${TOOL_CALL_PARSER}
      SGLANG_CUDA_GRAPH_MAX_BS: ${SGLANG_CUDA_GRAPH_MAX_BS}
      SGLANG_ENABLE_TORCH_COMPILE: ${SGLANG_ENABLE_TORCH_COMPILE}
      SGLANG_DISABLE_CUDA_GRAPH: ${SGLANG_DISABLE_CUDA_GRAPH}
      SGLANG_DISABLE_CUSTOM_ALL_REDUCE: ${SGLANG_DISABLE_CUSTOM_ALL_REDUCE}
      SGLANG_ENABLE_METRICS: ${SGLANG_ENABLE_METRICS}
      SGLANG_ENABLE_MFU_METRICS: ${SGLANG_ENABLE_MFU_METRICS}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
    volumes:
      - ${MODELS_DIR}:/models:ro
      - ./scripts/serve.sh:/etc/slgpu/serve.sh:ro
      - sglang-kernel-cache:/var/cache/slgpu-kernels
    entrypoint: ["/bin/bash"]
    command: ["/etc/slgpu/serve.sh"]
    networks:
      - slgpu
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

networks:
  slgpu:
    name: slgpu
    driver: bridge

volumes:
  sglang-kernel-cache:
