global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # vLLM/SGLang: не targets вида vllm:8111 — в разных compose-проектах (slgpu vs slgpu-monitoring) DNS
  # краткого имени vllm часто нет (lookup vllm … server misbehaving). Скрейп через порт, опубликованный на
  # хосте: host.docker.internal (см. extra_hosts в docker/docker-compose.monitoring.yml). Метка instance
  # выровнена с Grafana (vllmdash2).
  #
  # Нестандартные порты: при `./slgpu up -p <порт>` или другом LLM_API_PORT замените в targets ниже
  # host.docker.internal:8111 → host.docker.internal:<ваш LLM_API_PORT> для job vllm; для SGLang — :8222
  # на фактический опубликованный порт (см. main.env LLM_API_PORT / LLM_API_PORT_SGLANG).
  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8111"]
        labels:
          engine: vllm
    relabel_configs:
      - action: replace
        source_labels: [__address__]
        regex: .*
        target_label: instance
        replacement: vllm:8111

  - job_name: sglang
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8222"]
        labels:
          engine: sglang
    relabel_configs:
      - action: replace
        source_labels: [__address__]
        regex: .*
        target_label: instance
        replacement: sglang:8222

  - job_name: dcgm
    static_configs:
      - targets: ["dcgm-exporter:9400"]

  # Имя job совпадает с типичными фильтрами Grafana «Node Exporter Full» (ID 1860): выберите job = node-exporter.
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: host
