# Promtail: Docker service discovery, чтение json-логов с хоста.
# Требуется mount: /var/run/docker.sock, /var/lib/docker/containers:ro
# (см. https://grafana.com/docs/loki/latest/send-data/promtail/installation/ + docker_sd).
# Образ: grafana/promtail:2.9.8
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /data/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_id]
        regex: (.+)
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/$1-json.log
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      - target_label: job
        replacement: docker-logs
    pipeline_stages:
      - docker: {}
