# LiteLLM Proxy. Модели — в БД (STORE_MODEL_IN_DB) / Admin UI /ui, не в этом файле.
# Ключ: пустой LITELLM_MASTER_KEY (entrypoint снимает var) — без x-api-key (только доверенная сеть).
# Langfuse v3: callbacks langfuse_otel (не классический langfuse — ломается с v3). См. docs.litellm.ai — langfuse_otel_integration

model_list: []

litellm_settings:
  set_verbose: false
  # Клиенты (Cursor и др.) шлют reasoning_effort; vLLM OpenAI-API — нет. Иначе UnsupportedParamsError.
  drop_params: true
  # OTEL → Langfuse /api/public/otel; ключи в data/web/secrets/langfuse-litellm.env; LANGFUSE_OTEL_HOST в compose.
  callbacks: ["langfuse_otel"]
