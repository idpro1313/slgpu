# LiteLLM Proxy. vLLM: host.docker.internal:__LLM_API_PORT__. Клиент: "model": "devllm".
# Ключ: пустой LITELLM_MASTER_KEY (entrypoint снимает var) — без x-api-key (только доверенная сеть).
# Langfuse v3: callbacks langfuse_otel (не классический langfuse — ломается с v3). См. docs.litellm.ai — langfuse_otel_integration

model_list:
  - model_name: devllm
    litellm_params:
      model: openai/devllm
      api_base: http://host.docker.internal:__LLM_API_PORT__/v1
      api_key: "EMPTY"
      timeout: 600

litellm_settings:
  set_verbose: false
  # Клиенты (Cursor и др.) шлют reasoning_effort; vLLM OpenAI-API — нет. Иначе UnsupportedParamsError.
  drop_params: true
  # OTEL → Langfuse /api/public/otel; ключи в configs/secrets/langfuse-litellm.env; LANGFUSE_OTEL_HOST в compose.
  callbacks: ["langfuse_otel"]
