# LiteLLM Proxy. vLLM: host.docker.internal:__LLM_API_PORT__. Клиент: "model": "devllm".
# Ключ: пустой LITELLM_MASTER_KEY (entrypoint снимает var) — без x-api-key (только доверенная сеть).

model_list:
  - model_name: devllm
    litellm_params:
      model: openai/devllm
      api_base: http://host.docker.internal:__LLM_API_PORT__/v1
      api_key: "EMPTY"
      timeout: 600

litellm_settings:
  set_verbose: false
