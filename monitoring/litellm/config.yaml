# LiteLLM Proxy. vLLM: host.docker.internal:__LLM_API_PORT__. Клиент: "model": "devllm".
# Ключ: если LITELLM_MASTER_KEY пуст в main.env — x-api-key не обязателен (только в закрытой сети).

model_list:
  - model_name: devllm
    litellm_params:
      model: openai/devllm
      api_base: http://host.docker.internal:__LLM_API_PORT__/v1
      api_key: "EMPTY"
      timeout: 600

litellm_settings:
  set_verbose: false
