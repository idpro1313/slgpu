global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm:8111"]
        labels:
          engine: vllm

  - job_name: sglang
    metrics_path: /metrics
    static_configs:
      - targets: ["sglang:8222"]
        labels:
          engine: sglang

  - job_name: dcgm
    static_configs:
      - targets: ["dcgm-exporter:9400"]

  # Имя job совпадает с типичными фильтрами Grafana «Node Exporter Full» (ID 1860): выберите job = node-exporter.
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: host
