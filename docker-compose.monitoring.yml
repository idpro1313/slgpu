# dcgm, node-exporter, Prometheus, Grafana, Loki, Promtail — отдельно (./slgpu monitoring up).
# Сеть `slgpu` с docker-compose.yml: метрики и логи контейнеров. Данные на хосте: main.env
# (PROMETHEUS_DATA_DIR, GRAFANA_DATA_DIR, LOKI_DATA_DIR, PROMTAIL_DATA_DIR).

name: slgpu-monitoring

services:
  dcgm-exporter:
    image: nvidia/dcgm-exporter:latest
    env_file:
      - main.env
    restart: unless-stopped
    gpus: all
    cap_add:
      - SYS_ADMIN
    ports:
      - "${DCGM_BIND:-127.0.0.1}:9400:9400"
    networks:
      - slgpu
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  node-exporter:
    image: prom/node-exporter:latest
    env_file:
      - main.env
    restart: unless-stopped
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    ports:
      - "${NODE_EXPORTER_BIND:-127.0.0.1}:9100:9100"
    networks:
      - slgpu
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  loki:
    image: ${SLGPU_LOKI_IMAGE:-grafana/loki:2.9.8}
    # Данные Loki: chunks, index, wal — на хосте; права: ./slgpu monitoring fix-perms
    env_file:
      - main.env
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    networks:
      - slgpu
    volumes:
      - ${LOKI_DATA_DIR:-/opt/mon/loki}:/loki
      - ./monitoring/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  promtail:
    image: ${SLGPU_PROMTAIL_IMAGE:-grafana/promtail:2.9.8}
    # Сбор json-логов Docker: socket + /var/lib/docker/containers; позиции — PROMTAIL_DATA_DIR
    env_file:
      - main.env
    restart: unless-stopped
    user: root
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    networks:
      - slgpu
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ${PROMTAIL_DATA_DIR:-/opt/mon/promtail}:/data
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  prometheus:
    image: prom/prometheus:latest
    # Права на PROMETHEUS_DATA_DIR: ./scripts/monitoring_fix_permissions.sh или ./slgpu monitoring fix-perms
    # Скрейп vLLM/SGLang идёт на host.docker.internal:порт (см. prometheus.yml) — шлюз в хост, где
    # слушают опубликованные 8111/8222. Нужен для Linux (compose: host-gateway).
    env_file:
      - main.env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PROMETHEUS_BIND:-0.0.0.0}:9090:9090"
    networks:
      - slgpu
    volumes:
      - ${PROMETHEUS_DATA_DIR:-/opt/mon/prometheus}:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-100y}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-0}
      - --web.enable-lifecycle
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  grafana:
    image: grafana/grafana:latest
    # Права на GRAFANA_DATA_DIR: ./slgpu monitoring fix-perms (uid/gid из образа, без угадывания)
    env_file:
      - main.env
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    ports:
      - "${GRAFANA_BIND:-0.0.0.0}:${GRAFANA_PORT:-3000}:3000"
    networks:
      - slgpu
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-}
    volumes:
      - ${GRAFANA_DATA_DIR:-/opt/mon/grafana}:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

networks:
  slgpu:
    name: slgpu
    external: true
