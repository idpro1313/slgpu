# dcgm, node-exporter, Prometheus, Grafana — отдельно от движка (см. ./slgpu monitoring up).
# Общая сеть `slgpu` с docker-compose.yml: Prometheus скрейпит vllm:8111 / sglang:8222 по DNS.
# Данные TSDB / SQLite Grafana — bind mount на хост, пути: PROMETHEUS_DATA_DIR, GRAFANA_DATA_DIR (main.env).

name: slgpu-monitoring

services:
  dcgm-exporter:
    image: nvidia/dcgm-exporter:latest
    env_file:
      - main.env
    restart: unless-stopped
    gpus: all
    cap_add:
      - SYS_ADMIN
    ports:
      - "${DCGM_BIND:-127.0.0.1}:9400:9400"
    networks:
      - slgpu
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  node-exporter:
    image: prom/node-exporter:latest
    env_file:
      - main.env
    restart: unless-stopped
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    ports:
      - "${NODE_EXPORTER_BIND:-127.0.0.1}:9100:9100"
    networks:
      - slgpu
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  prometheus:
    image: prom/prometheus:latest
    # С bind mount PROMETHEUS_DATA_DIR: sudo chown -R 65534:65534 (см. monitoring/README)
    user: "65534:65534"
    env_file:
      - main.env
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_BIND:-127.0.0.1}:9090:9090"
    networks:
      - slgpu
    volumes:
      - ${PROMETHEUS_DATA_DIR:-/var/lib/slgpu/prometheus}:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-0}
      - --web.enable-lifecycle
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  grafana:
    image: grafana/grafana:latest
    # С bind mount GRAFANA_DATA_DIR на хосте: sudo chown -R 472:0 (см. monitoring/README, иначе not writable)
    user: "472:0"
    env_file:
      - main.env
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_BIND:-0.0.0.0}:${GRAFANA_PORT:-3000}:3000"
    networks:
      - slgpu
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-}
    volumes:
      - ${GRAFANA_DATA_DIR:-/var/lib/slgpu/grafana}:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

networks:
  slgpu:
    name: slgpu
    external: true
